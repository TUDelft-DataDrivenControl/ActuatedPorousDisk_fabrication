[env:lolin_s3_mini]
platform = espressif32
board = lolin_s3_mini
framework = arduino
lib_deps =
	tomstewart89/BasicLinearAlgebra@^5.1
	adafruit/Adafruit ADS1X15@^2.5.0
	waspinator/AccelStepper@^1.64
	adafruit/Adafruit NeoPixel@^1.13.0
build_flags =
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1
